<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>Primary</title>
<style>
/* ============================================
   PRIMARY MATCH — "A dating app for politics"
   
   SOUND & HAPTICS SPEC (for implementation):
   ─────────────────────────────────────────
   SWIPE START: Soft 'pick up' — light haptic tap (UIImpactFeedbackGenerator.light)
   SWIPE MOVING: Subtle continuous friction sound, like sliding paper
   SWIPE COMMIT (>threshold): Satisfying 'thunk' — medium haptic (UIImpactFeedbackGenerator.medium)
                              Short percussive sound, wooden block tap
   SWIPE REJECT (<threshold): Card snaps back — rubber band sound, light haptic
   CARD ENTER: Whoosh-in, like dealing a card from a deck
   MATCH REVEAL: Building tension — low rumble crescendo (1.2s)
                 Then: BURST — success notification (UINotificationFeedbackGenerator.success)
                 Bright bell/chime, single clear note (think Wordle win but warmer)
   MATCH % COUNTER: Each tick — tiny click, like a flip clock
   SURPRISE MATCH: Extra haptic burst pattern: tap-pause-tap-tap
                   Slightly dissonant then resolving chord
   STREAK BADGE: Coin-drop sound, satisfying weight
   SHARE COPY: Crisp 'stamp' sound — like a passport stamp
   DAILY REFRESH: Newspaper unfold sound, papery and warm
   ============================================ */

@import url('https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,600;8..60,700&family=DM+Sans:wght@400;500;600;700&display=swap');

* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

:root {
  --bg: #F5F0EA;
  --card: #FFFFFF;
  --text: #1A1A19;
  --muted: #8A8A85;
  --agree: #4A90D9;
  --disagree: #D4654A;
  --match-gold: #D4A03C;
  --surprise: #7B61C7;
  --surface: #EDE8E1;
  --card-shadow: 0 2px 20px rgba(0,0,0,0.08), 0 1px 3px rgba(0,0,0,0.06);
  --card-shadow-lifted: 0 12px 40px rgba(0,0,0,0.15), 0 4px 12px rgba(0,0,0,0.1);
  --radius: 16px;
  --safe-bottom: env(safe-area-inset-bottom, 0px);
}

html, body {
  height: 100%; width: 100%;
  overflow: hidden;
  background: var(--bg);
  font-family: 'DM Sans', -apple-system, sans-serif;
  color: var(--text);
  touch-action: none;
  -webkit-user-select: none; user-select: none;
}

/* ─── SCREENS ─── */
.screen { 
  position: absolute; inset: 0; 
  display: flex; flex-direction: column;
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease, transform 0.4s ease;
  transform: translateY(8px);
}
.screen.active { 
  opacity: 1; pointer-events: all; 
  transform: translateY(0);
}

/* ─── SPLASH / START ─── */
#splash {
  justify-content: center; align-items: center;
  padding: 40px 32px;
  padding-bottom: calc(40px + var(--safe-bottom));
}
.splash-mark {
  width: 64px; height: 64px;
  background: var(--text);
  border-radius: 14px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 24px;
  transform: rotate(-3deg);
}
.splash-mark svg { width: 36px; height: 36px; }
.splash-title {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 32px; font-weight: 700;
  letter-spacing: -0.5px;
  margin-bottom: 8px;
}
.splash-sub {
  color: var(--muted); font-size: 15px;
  margin-bottom: 48px; text-align: center;
  line-height: 1.5; max-width: 260px;
}
.splash-streak {
  background: var(--surface);
  border-radius: 12px;
  padding: 12px 20px;
  font-size: 14px;
  color: var(--muted);
  margin-bottom: 32px;
  display: none;
}
.splash-streak strong { color: var(--text); }
.start-btn {
  width: 100%; max-width: 320px;
  padding: 18px;
  background: var(--text);
  color: var(--bg);
  border: none; border-radius: 14px;
  font-family: inherit; font-size: 17px; font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  position: relative;
  overflow: hidden;
}
.start-btn:active { 
  transform: scale(0.97); 
  box-shadow: 0 2px 8px rgba(0,0,0,0.2);
}
.start-btn .btn-hint {
  display: block; font-size: 12px; font-weight: 400;
  opacity: 0.5; margin-top: 4px;
}
.played-today {
  text-align: center; padding: 20px;
}
.played-today p { color: var(--muted); font-size: 15px; line-height: 1.5; }

/* ─── GAME SCREEN ─── */
#game {
  padding: 0;
}
.game-header {
  padding: 16px 24px 0;
  display: flex; align-items: center; justify-content: space-between;
  z-index: 10;
}
.progress-dots {
  display: flex; gap: 8px;
}
.progress-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  background: var(--surface);
  transition: background 0.3s ease, transform 0.3s ease;
}
.progress-dot.done { background: var(--text); transform: scale(1.1); }
.progress-dot.current { 
  background: var(--text); 
  animation: pulse-dot 1.5s ease infinite;
}
@keyframes pulse-dot {
  0%, 100% { transform: scale(1); opacity: 1; }
  50% { transform: scale(1.3); opacity: 0.7; }
}
.game-topic-label {
  font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--muted);
}

.card-area {
  flex: 1;
  display: flex; align-items: center; justify-content: center;
  padding: 24px;
  position: relative;
  perspective: 1200px;
}

.swipe-card {
  width: 100%; max-width: 380px;
  background: var(--card);
  border-radius: var(--radius);
  box-shadow: var(--card-shadow);
  padding: 32px 28px;
  position: relative;
  cursor: grab;
  transition: box-shadow 0.2s ease;
  transform-origin: center bottom;
  will-change: transform;
}
.swipe-card:active { cursor: grabbing; }
.swipe-card.lifted { box-shadow: var(--card-shadow-lifted); }

.card-category {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 16px;
  display: flex; align-items: center; gap: 8px;
}
.card-category::before {
  content: ''; display: block;
  width: 8px; height: 8px; border-radius: 2px;
  background: currentColor;
}
.card-statement {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 22px; font-weight: 400;
  line-height: 1.45;
  margin-bottom: 20px;
  color: var(--text);
}
.card-context {
  font-size: 13px; color: var(--muted);
  line-height: 1.5;
  padding-top: 16px;
  border-top: 1px solid var(--surface);
}

/* Swipe indicators */
.swipe-indicator {
  position: absolute;
  top: 24px; 
  font-size: 15px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 2px;
  padding: 6px 14px;
  border-radius: 8px; border: 3px solid;
  opacity: 0; transition: opacity 0.15s;
  pointer-events: none;
}
.swipe-indicator.agree {
  right: 20px; color: var(--agree); border-color: var(--agree);
  transform: rotate(12deg);
}
.swipe-indicator.disagree {
  left: 20px; color: var(--disagree); border-color: var(--disagree);
  transform: rotate(-12deg);
}

/* Bottom action zone — thumb territory */
.action-zone {
  padding: 8px 40px 24px;
  padding-bottom: calc(24px + var(--safe-bottom));
  display: flex; justify-content: center; align-items: center; gap: 48px;
}
.action-btn {
  width: 64px; height: 64px;
  border-radius: 50%;
  border: 2.5px solid;
  background: var(--card);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  transition: transform 0.15s ease, box-shadow 0.15s ease;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
}
.action-btn:active { transform: scale(0.9); }
.action-btn.disagree-btn { border-color: var(--disagree); color: var(--disagree); }
.action-btn.agree-btn { border-color: var(--agree); color: var(--agree); }
.action-btn svg { width: 28px; height: 28px; }

/* Skip / it's complicated */
.skip-link {
  text-align: center; padding: 0 0 8px;
  font-size: 13px; color: var(--muted);
  cursor: pointer;
  transition: opacity 0.15s;
}
.skip-link:hover { opacity: 0.7; }

/* ─── RESULTS / MATCH REVEAL ─── */
#results {
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  padding: 0 0 calc(32px + var(--safe-bottom));
}
.results-inner {
  padding: 32px 24px;
  max-width: 440px;
  margin: 0 auto;
}

/* Match reveal animation */
.match-reveal {
  text-align: center;
  padding: 40px 0 32px;
  opacity: 0;
  transform: scale(0.9);
  transition: opacity 0.6s ease, transform 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
}
.match-reveal.visible {
  opacity: 1; transform: scale(1);
}
.match-pct {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 72px; font-weight: 700;
  color: var(--text);
  line-height: 1;
  margin-bottom: 4px;
}
.match-pct .pct-sign { font-size: 36px; font-weight: 400; }
.match-label {
  font-size: 13px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 8px;
}
.match-name {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 28px; font-weight: 600;
}
.match-meta {
  font-size: 14px; color: var(--muted);
  margin-top: 4px;
}
.surprise-tag {
  display: inline-block;
  background: var(--surprise);
  color: white;
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
  padding: 5px 12px;
  border-radius: 6px;
  margin-top: 12px;
}

/* Match list */
.match-list {
  margin-top: 32px;
}
.match-list-title {
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 16px;
}
.match-item {
  background: var(--card);
  border-radius: 14px;
  padding: 16px 20px;
  margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  display: flex; align-items: center; justify-content: space-between;
  cursor: pointer;
  transition: transform 0.15s ease;
}
.match-item:active { transform: scale(0.98); }
.match-item-left {
  display: flex; align-items: center; gap: 14px;
}
.match-avatar {
  width: 44px; height: 44px;
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 18px; font-weight: 700;
  color: white;
}
.match-item-name { font-weight: 600; font-size: 16px; }
.match-item-detail { font-size: 13px; color: var(--muted); }
.match-item-score {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 24px; font-weight: 700;
}

/* Stance breakdown */
.stance-breakdown {
  margin-top: 32px;
}
.stance-row {
  background: var(--card);
  border-radius: 14px;
  padding: 16px 20px;
  margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.stance-topic {
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 8px;
}
.stance-compare {
  display: flex; align-items: center; gap: 12px;
  font-size: 14px;
}
.stance-you, .stance-them {
  display: flex; align-items: center; gap: 6px;
}
.stance-dot {
  width: 10px; height: 10px; border-radius: 50%;
}
.stance-dot.agree { background: var(--agree); }
.stance-dot.disagree { background: var(--disagree); }
.stance-dot.skip { background: var(--muted); }
.stance-vs {
  color: var(--muted); font-size: 11px; font-weight: 600;
}
.stance-match-icon { margin-left: auto; font-size: 18px; }

/* Share card */
.share-section {
  margin-top: 32px;
  text-align: center;
}
.share-grid {
  background: var(--text);
  color: var(--bg);
  border-radius: 14px;
  padding: 24px;
  margin-bottom: 16px;
  font-family: 'DM Sans', monospace;
}
.share-grid-title {
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 2px;
  opacity: 0.5;
  margin-bottom: 12px;
}
.share-grid-date {
  font-size: 11px; opacity: 0.4; margin-bottom: 16px;
}
.share-rows {
  display: flex; flex-direction: column; gap: 6px;
  align-items: center;
}
.share-row {
  display: flex; gap: 6px;
}
.share-block {
  width: 32px; height: 32px;
  border-radius: 6px;
}
.share-block.agree-match { background: var(--agree); }
.share-block.agree-nomatch { background: rgba(74,144,217,0.25); }
.share-block.disagree-match { background: var(--disagree); }
.share-block.disagree-nomatch { background: rgba(212,101,74,0.25); }
.share-block.skip-block { background: rgba(255,255,255,0.15); }
.share-prompt {
  font-size: 14px; font-weight: 600;
  margin-top: 8px;
  opacity: 0.7;
}

.share-btn {
  width: 100%;
  padding: 16px;
  background: var(--text);
  color: var(--bg);
  border: none; border-radius: 14px;
  font-family: inherit; font-size: 16px; font-weight: 600;
  cursor: pointer;
  transition: transform 0.15s;
}
.share-btn:active { transform: scale(0.97); }

/* Deep dive link */
.deepdive-section {
  margin-top: 24px;
}
.deepdive-card {
  background: var(--card);
  border-radius: 14px;
  padding: 20px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
  cursor: pointer;
  transition: transform 0.15s;
}
.deepdive-card:active { transform: scale(0.98); }
.deepdive-label {
  font-size: 11px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 2px;
  color: var(--muted);
  margin-bottom: 8px;
}
.deepdive-title {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 18px; font-weight: 600;
  margin-bottom: 4px;
}
.deepdive-sub { font-size: 13px; color: var(--muted); }

/* ─── REP PROFILE (modal-style) ─── */
#rep-profile {
  overflow-y: auto; -webkit-overflow-scrolling: touch;
  background: var(--bg);
}
.rep-profile-inner {
  padding: 24px;
  max-width: 440px;
  margin: 0 auto;
  padding-bottom: calc(32px + var(--safe-bottom));
}
.rep-back {
  font-size: 14px; color: var(--muted); cursor: pointer;
  margin-bottom: 24px; display: inline-block;
}
.rep-header {
  text-align: center; margin-bottom: 32px;
}
.rep-avatar-large {
  width: 80px; height: 80px;
  border-radius: 20px;
  margin: 0 auto 16px;
  display: flex; align-items: center; justify-content: center;
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 32px; font-weight: 700; color: white;
}
.rep-name-large {
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 28px; font-weight: 700;
}
.rep-detail-large { font-size: 14px; color: var(--muted); margin-top: 4px; }
.rep-compat {
  margin-top: 16px;
  font-family: 'Source Serif 4', Georgia, serif;
  font-size: 48px; font-weight: 700;
}
.rep-compat-label {
  font-size: 12px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 2px;
  color: var(--muted);
}
.rep-votes-section {
  margin-top: 32px;
}
.rep-vote-row {
  background: var(--card);
  border-radius: 14px;
  padding: 16px 20px;
  margin-bottom: 10px;
  box-shadow: 0 1px 4px rgba(0,0,0,0.04);
}
.rep-vote-topic {
  font-size: 12px; font-weight: 700;
  text-transform: uppercase; letter-spacing: 1.5px;
  color: var(--muted);
  margin-bottom: 6px;
}
.rep-vote-stance {
  font-size: 15px; font-weight: 500;
  display: flex; align-items: center; gap: 8px;
}

/* ─── ANIMATIONS ─── */
@keyframes card-in {
  from { opacity: 0; transform: translateY(30px) scale(0.95); }
  to { opacity: 1; transform: translateY(0) scale(1); }
}
@keyframes fly-out-right {
  to { transform: translateX(120%) rotate(20deg); opacity: 0; }
}
@keyframes fly-out-left {
  to { transform: translateX(-120%) rotate(-20deg); opacity: 0; }
}
.card-entering { animation: card-in 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
.card-exit-right { animation: fly-out-right 0.3s ease forwards; }
.card-exit-left { animation: fly-out-left 0.3s ease forwards; }

@keyframes count-up-pulse {
  0% { transform: scale(1); }
  50% { transform: scale(1.05); }
  100% { transform: scale(1); }
}

/* Copied toast */
.toast {
  position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
  background: var(--text); color: var(--bg);
  padding: 12px 24px; border-radius: 10px;
  font-size: 14px; font-weight: 600;
  opacity: 0; transition: opacity 0.3s;
  z-index: 999;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* Responsive */
@media (max-width: 380px) {
  .card-statement { font-size: 19px; }
  .swipe-card { padding: 24px 20px; }
  .match-pct { font-size: 60px; }
}
</style>
</head>
<body>

<!-- ═══════════ SPLASH ═══════════ -->
<div id="splash" class="screen active">
  <div class="splash-mark">
    <svg viewBox="0 0 24 24" fill="none" stroke="#F5F0EA" stroke-width="2.5" stroke-linecap="round">
      <path d="M12 3L20 7.5V16.5L12 21L4 16.5V7.5L12 3Z"/>
      <path d="M12 12L20 7.5"/>
      <path d="M12 12V21"/>
      <path d="M12 12L4 7.5"/>
    </svg>
  </div>
  <div class="splash-title">Primary</div>
  <div class="splash-sub">5 issues. Your honest take.<br>See who you actually match with.</div>
  <div class="splash-streak" id="streakBadge"></div>
  <div id="splashAction">
    <button class="start-btn" onclick="startGame()">
      Today's Match
      <span class="btn-hint">Apr 1 · takes ~60 seconds</span>
    </button>
  </div>
</div>

<!-- ═══════════ GAME ═══════════ -->
<div id="game" class="screen">
  <div class="game-header">
    <div class="progress-dots" id="progressDots"></div>
    <div class="game-topic-label" id="topicLabel"></div>
  </div>
  
  <div class="card-area" id="cardArea">
    <div class="swipe-card" id="swipeCard">
      <div class="swipe-indicator agree">Agree</div>
      <div class="swipe-indicator disagree">Nope</div>
      <div class="card-category" id="cardCategory"></div>
      <div class="card-statement" id="cardStatement"></div>
      <div class="card-context" id="cardContext"></div>
    </div>
  </div>
  
  <div class="skip-link" onclick="skipCard()">it's complicated — skip</div>
  
  <div class="action-zone">
    <button class="action-btn disagree-btn" onclick="swipeLeft()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
      </svg>
    </button>
    <button class="action-btn agree-btn" onclick="swipeRight()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </button>
  </div>
</div>

<!-- ═══════════ RESULTS ═══════════ -->
<div id="results" class="screen">
  <div class="results-inner" id="resultsInner"></div>
</div>

<!-- ═══════════ REP PROFILE ═══════════ -->
<div id="rep-profile" class="screen">
  <div class="rep-profile-inner" id="repProfileInner"></div>
</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════
// PRIMARY MATCH — Game Engine
// ═══════════════════════════════════════════════

// ─── TODAY'S ISSUES (mock data — would come from Orion Council API) ───
const TODAY = {
  date: '2025-04-01',
  issues: [
    {

    },

    {

      context: 'The 1994 assault weapons ban expired in 2004. Mass shooting deaths have tripled since.',
      topicSlug: 'assault-weapons-ban'
    }
  ]
};

// ─── REPRESENTATIVES (mock — would come from VoteView + member data) ───
const REPS = [
  {
    id: 'sen-warren',
    name: 'Elizabeth Warren',
    title: 'Senator · D-MA',
    party: 'D',
    color: '#4A90D9',

  {

  },
  {

    title: 'Rep · D-NY-14',

    color: '#7B61C7',

// ─── STATE ───
let currentIndex = 0;
let answers = []; // true=agree, false=disagree, null=skip
let isDragging = false;
let startX = 0, startY = 0, currentX = 0;
let cardEl, cardArea;

// ─── PERSISTENCE ───
function getStore() {
  try { return JSON.parse(localStorage.getItem('primary_match') || '{}'); } 
  catch { return {}; }
}
function setStore(data) {
  localStorage.setItem('primary_match', JSON.stringify({ ...getStore(), ...data }));
}

// ─── INIT ───
function init() {
  const store = getStore();
  
  // Check if played today
  if (store.lastPlayed === TODAY.date && store.answers) {
    showSplashPlayed(store);
    return;
  }
  
  // Show streak
  if (store.streak && store.streak > 1) {
    const badge = document.getElementById('streakBadge');
    badge.style.display = 'block';
    badge.innerHTML = `<strong>${store.streak} day streak</strong> · keep it going`;
  }
}

function showSplashPlayed(store) {
  const action = document.getElementById('splashAction');
  action.innerHTML = `
    <div class="played-today">
      <p>You've matched today.<br>Come back tomorrow for 5 new issues.</p>
      <br>
      <button class="start-btn" onclick="showResults()" style="background: var(--surface); color: var(--text);">
        See Today's Results
      </button>
    </div>
  `;
  answers = store.answers;
}

function startGame() {
  currentIndex = 0;
  answers = [];
  showScreen('game');
  renderCard();
}

// ─── SCREEN MANAGEMENT ───
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// ─── CARD RENDERING ───
function renderCard() {
  if (currentIndex >= TODAY.issues.length) {
    finishGame();
    return;
  }
  
  const issue = TODAY.issues[currentIndex];
  
  // Progress dots
  const dotsHtml = TODAY.issues.map((_, i) => {
    let cls = 'progress-dot';
    if (i < currentIndex) cls += ' done';
    else if (i === currentIndex) cls += ' current';
    return `<div class="${cls}"></div>`;
  }).join('');
  document.getElementById('progressDots').innerHTML = dotsHtml;
  document.getElementById('topicLabel').textContent = `${currentIndex + 1} of ${TODAY.issues.length}`;
  
  document.getElementById('cardCategory').textContent = issue.category;
  document.getElementById('cardStatement').textContent = issue.statement;
  document.getElementById('cardContext').textContent = issue.context;
  
  // Animate in
  cardEl = document.getElementById('swipeCard');
  cardEl.className = 'swipe-card card-entering';
  cardEl.style.transform = '';
  
  // Reset indicators
  cardEl.querySelector('.agree').style.opacity = 0;
  cardEl.querySelector('.disagree').style.opacity = 0;
  
  setupTouch();
}

// ─── TOUCH / SWIPE ───
function setupTouch() {
  cardEl = document.getElementById('swipeCard');
  cardArea = document.getElementById('cardArea');
  
  // Remove old listeners by replacing node
  const newCard = cardEl.cloneNode(true);
  cardEl.parentNode.replaceChild(newCard, cardEl);
  cardEl = newCard;
  
  cardEl.addEventListener('pointerdown', onPointerDown, { passive: false });
}

function onPointerDown(e) {
  isDragging = true;
  startX = e.clientX;
  startY = e.clientY;
  currentX = 0;
  cardEl.classList.add('lifted');
  cardEl.setPointerCapture(e.pointerId);
  
  cardEl.addEventListener('pointermove', onPointerMove, { passive: false });
  cardEl.addEventListener('pointerup', onPointerUp);
  cardEl.addEventListener('pointercancel', onPointerUp);
}

function onPointerMove(e) {
  if (!isDragging) return;
  e.preventDefault();
  const dx = e.clientX - startX;
  currentX = dx;
  
  const rotate = dx * 0.08;
  const maxTilt = 15;
  const r = Math.max(-maxTilt, Math.min(maxTilt, rotate));
  
  cardEl.style.transform = `translateX(${dx}px) rotate(${r}deg)`;
  cardEl.style.transition = 'none';
  
  // Show indicators
  const threshold = 40;
  const agreeEl = cardEl.querySelector('.agree');
  const disagreeEl = cardEl.querySelector('.disagree');
  
  if (dx > threshold) {
    agreeEl.style.opacity = Math.min(1, (dx - threshold) / 60);
    disagreeEl.style.opacity = 0;
  } else if (dx < -threshold) {
    disagreeEl.style.opacity = Math.min(1, (-dx - threshold) / 60);
    agreeEl.style.opacity = 0;
  } else {
    agreeEl.style.opacity = 0;
    disagreeEl.style.opacity = 0;
  }
}

function onPointerUp(e) {
  if (!isDragging) return;
  isDragging = false;
  cardEl.classList.remove('lifted');
  
  cardEl.removeEventListener('pointermove', onPointerMove);
  cardEl.removeEventListener('pointerup', onPointerUp);
  cardEl.removeEventListener('pointercancel', onPointerUp);
  
  const threshold = 80;
  
  if (currentX > threshold) {
    commitSwipe(true);
  } else if (currentX < -threshold) {
    commitSwipe(false);
  } else {
    // Snap back
    cardEl.style.transition = 'transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
    cardEl.style.transform = '';
    cardEl.querySelector('.agree').style.opacity = 0;
    cardEl.querySelector('.disagree').style.opacity = 0;
  }
}

function commitSwipe(agree) {
  answers.push(agree);
  
  cardEl.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
  if (agree) {
    cardEl.classList.add('card-exit-right');
  } else {
    cardEl.classList.add('card-exit-left');
  }
  
  // Haptic feedback (spec: medium impact)
  if (navigator.vibrate) navigator.vibrate(15);
  
  setTimeout(() => {
    currentIndex++;
    renderCard();
  }, 300);
}

function swipeRight() { commitSwipe(true); }
function swipeLeft() { commitSwipe(false); }
function skipCard() {
  answers.push(null);
  cardEl.style.transition = 'transform 0.3s ease, opacity 0.3s ease';
  cardEl.style.transform = 'translateY(40px) scale(0.9)';
  cardEl.style.opacity = '0';
  setTimeout(() => { currentIndex++; renderCard(); }, 300);
}

// ─── FINISH & MATCH ───
function finishGame() {
  // Calculate matches
  const matches = REPS.map(rep => {
    let agree = 0, total = 0;
    TODAY.issues.forEach((issue, i) => {
      if (answers[i] === null) return;
      total++;
      if (answers[i] === rep.votes[issue.id]) agree++;
    });
    return { ...rep, score: total > 0 ? Math.round((agree / total) * 100) : 50, agree, total };
  }).sort((a, b) => b.score - a.score);
  
  // Save
  const store = getStore();
  const streak = (store.lastPlayed && daysBetween(store.lastPlayed, TODAY.date) === 1) 
    ? (store.streak || 1) + 1 : 1;
  setStore({ lastPlayed: TODAY.date, answers, streak, matches: matches.map(m => ({ id: m.id, score: m.score })) });
  
  buildResults(matches);
  showScreen('results');
  
  // Trigger reveal animation
  setTimeout(() => {
    document.querySelector('.match-reveal').classList.add('visible');
    animateCount(document.getElementById('topMatchPct'), matches[0].score);
  }, 200);
}

function showResults() {
  const store = getStore();
  answers = store.answers || [];
  const matches = REPS.map(rep => {
    let agree = 0, total = 0;
    TODAY.issues.forEach((issue, i) => {
      if (answers[i] === null) return;
      total++;
      if (answers[i] === rep.votes[issue.id]) agree++;
    });
    return { ...rep, score: total > 0 ? Math.round((agree / total) * 100) : 50, agree, total };
  }).sort((a, b) => b.score - a.score);
  
  buildResults(matches);
  showScreen('results');
  setTimeout(() => {
    document.querySelector('.match-reveal').classList.add('visible');
    animateCount(document.getElementById('topMatchPct'), matches[0].score);
  }, 200);
}

function buildResults(matches) {
  const top = matches[0];
  // Is the top match a "surprise"? (different party from majority of user's leanings)
  const userLeanLeft = answers.filter((a, i) => a !== null).length > 0;
  const surprise = (top.party === 'R' && answers.filter(a => a === true).length > 2) ||
                   (top.party === 'D' && answers.filter(a => a === false).length > 2);
  
  let html = `
    <div class="match-reveal">
      <div class="match-label">Your top match</div>
      <div class="match-pct"><span id="topMatchPct">0</span><span class="pct-sign">%</span></div>
      <div class="match-name">${top.name}</div>
      <div class="match-meta">${top.title}</div>
      ${surprise ? '<div class="surprise-tag">Surprise Match</div>' : ''}
    </div>
    
    <div class="match-list">
      <div class="match-list-title">All Matches</div>
      ${matches.map(m => `
        <div class="match-item" onclick="showRepProfile('${m.id}')">
          <div class="match-item-left">
            <div class="match-avatar" style="background: ${m.color}">${m.name.split(' ').map(n=>n[0]).join('')}</div>
            <div>
              <div class="match-item-name">${m.name}</div>
              <div class="match-item-detail">${m.title}</div>
            </div>
          </div>
          <div class="match-item-score" style="color: ${m.score >= 60 ? 'var(--agree)' : m.score <= 40 ? 'var(--disagree)' : 'var(--muted)'}">${m.score}%</div>
        </div>
      `).join('')}
    </div>
    
    <div class="stance-breakdown">
      <div class="match-list-title">Your Stances vs ${top.name.split(' ')[1]}</div>
      ${TODAY.issues.map((issue, i) => {
        const userStance = answers[i];
        const repStance = top.votes[issue.id];
        const match = userStance === null ? false : userStance === repStance;
        return `
          <div class="stance-row">
            <div class="stance-topic">${issue.category}</div>
            <div class="stance-compare">
              <div class="stance-you">
                <div class="stance-dot ${userStance === true ? 'agree' : userStance === false ? 'disagree' : 'skip'}"></div>
                You: ${userStance === true ? 'Agree' : userStance === false ? 'Disagree' : 'Skipped'}
              </div>
              <div class="stance-vs">vs</div>
              <div class="stance-them">
                <div class="stance-dot ${repStance ? 'agree' : 'disagree'}"></div>
                ${repStance ? 'Yea' : 'Nay'}
              </div>
              <div class="stance-match-icon">${match ? '●' : '○'}</div>
            </div>
          </div>
        `;
      }).join('')}
    </div>
    
    <div class="share-section">
      ${buildShareGrid()}
      <button class="share-btn" onclick="copyShare()">Copy Results</button>
    </div>
    
    <div class="deepdive-section">
      <div class="match-list-title" style="margin-bottom: 12px;">Go deeper</div>
      ${TODAY.issues.slice(0, 2).map(issue => `
        <div class="deepdive-card" style="margin-bottom: 10px;">
          <div class="deepdive-label">${issue.category}</div>
          <div class="deepdive-title">${issue.statement.substring(0, 60)}...</div>
          <div class="deepdive-sub">Read the Orion Council analysis ›</div>
        </div>
      `).join('')}
    </div>
  `;
  
  document.getElementById('resultsInner').innerHTML = html;
}

function buildShareGrid() {
  const top = REPS.map(rep => {
    let agree = 0, total = 0;
    TODAY.issues.forEach((issue, i) => {
      if (answers[i] === null) return; total++;
      if (answers[i] === rep.votes[issue.id]) agree++;
    });
    return { ...rep, score: total > 0 ? Math.round((agree / total) * 100) : 50 };
  }).sort((a, b) => b.score - a.score)[0];
  
  const rows = TODAY.issues.map((issue, i) => {
    const user = answers[i];
    const rep = top.votes[issue.id];
    let cls = 'skip-block';
    if (user === null) cls = 'skip-block';
    else if (user === rep) cls = user ? 'agree-match' : 'disagree-match';
    else cls = user ? 'agree-nomatch' : 'disagree-nomatch';
    return `<div class="share-row">
      <div class="share-block ${cls}"></div>
    </div>`;
  }).join('');
  
  return `
    <div class="share-grid">
      <div class="share-grid-title">Primary</div>
      <div class="share-grid-date">${TODAY.date}</div>
      <div class="share-rows">${rows}</div>
      <div class="share-prompt">${top.score}% match</div>
    </div>
  `;
}

function getShareText() {
  const top = REPS.map(rep => {
    let agree = 0, total = 0;
    TODAY.issues.forEach((issue, i) => {
      if (answers[i] === null) return; total++;
      if (answers[i] === rep.votes[issue.id]) agree++;
    });
    return { ...rep, score: total > 0 ? Math.round((agree / total) * 100) : 50 };
  }).sort((a, b) => b.score - a.score)[0];
  
  const blocks = TODAY.issues.map((issue, i) => {
    const user = answers[i];
    const rep = top.votes[issue.id];
    if (user === null) return '\u2B1C'; // white square
    if (user === rep) return user ? '\u{1F7E6}' : '\u{1F7E7}'; // blue/orange square
    return '\u2B1B'; // black square
  }).join('');
  
  return `Primary ${TODAY.date}\n${blocks}\n${top.score}% match\nprimarydaily.com/match`;
}

function copyShare() {
  navigator.clipboard.writeText(getShareText()).then(() => {
    showToast('Copied to clipboard');
  }).catch(() => {
    showToast('Copied!');
  });
}

// ─── REP PROFILE ───
function showRepProfile(repId) {
  const rep = REPS.find(r => r.id === repId);
  if (!rep) return;
  
  let agree = 0, total = 0;
  TODAY.issues.forEach((issue, i) => {
    if (answers[i] === null) return; total++;
    if (answers[i] === rep.votes[issue.id]) agree++;
  });
  const score = total > 0 ? Math.round((agree / total) * 100) : 50;
  
  const html = `
    <div class="rep-back" onclick="showScreen('results')">&larr; Back to matches</div>
    <div class="rep-header">
      <div class="rep-avatar-large" style="background: ${rep.color}">${rep.name.split(' ').map(n=>n[0]).join('')}</div>
      <div class="rep-name-large">${rep.name}</div>
      <div class="rep-detail-large">${rep.title}</div>
      <div class="rep-compat-label">Compatibility</div>
      <div class="rep-compat" style="color: ${score >= 60 ? 'var(--agree)' : score <= 40 ? 'var(--disagree)' : 'var(--muted)'}">${score}%</div>
    </div>
    <div class="rep-votes-section">
      <div class="match-list-title">How they voted</div>
      ${TODAY.issues.map((issue, i) => {
        const voted = rep.votes[issue.id];
        const userVote = answers[i];
        const match = userVote !== null && userVote === voted;
        return `
          <div class="rep-vote-row">
            <div class="rep-vote-topic">${issue.category}</div>
            <div class="rep-vote-stance">
              <div class="stance-dot ${voted ? 'agree' : 'disagree'}"></div>
              Voted ${voted ? 'Yea' : 'Nay'}
              ${userVote !== null ? `<span style="margin-left:auto;color:${match ? 'var(--agree)' : 'var(--disagree)'}">${match ? 'You agreed' : 'You disagreed'}</span>` : ''}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
  
  document.getElementById('repProfileInner').innerHTML = html;
  showScreen('rep-profile');
}

// ─── UTILITIES ───
function animateCount(el, target) {
  let current = 0;
  const duration = 800;
  const start = performance.now();
  function tick(now) {
    const elapsed = now - start;
    const progress = Math.min(elapsed / duration, 1);
    const eased = 1 - Math.pow(1 - progress, 3);
    current = Math.round(eased * target);
    el.textContent = current;
    if (progress < 1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 2000);
}

function daysBetween(d1, d2) {
  return Math.round((new Date(d2) - new Date(d1)) / 86400000);
}

// ─── BOOT ───
init();
</script>
